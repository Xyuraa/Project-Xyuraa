<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

.nb {
  background: #f7f2e8;
  min-height: 100vh;
  padding: 2.5rem 1.25rem 3rem;
  display: flex;
  justify-content: center;
  background-image: radial-gradient(#d4cfc4 1px, transparent 1px);
  background-size: 22px 22px;
}

.nb-inner {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.nb-profile {
  background: #fff;
  border: 3px solid #111;
  box-shadow: 7px 7px 0 #111;
  padding: 2rem 1.75rem 1.75rem;
  text-align: center;
}

.nb-avatar-wrap {
  position: relative;
  display: inline-block;
  margin-bottom: 18px;
}

.nb-avatar {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  background: #FFE135;
  border: 3px solid #111;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Unbounded', sans-serif;
  font-size: 24px;
  font-weight: 900;
  color: #111;
  box-shadow: 4px 4px 0 #111;
}

.nb-status-dot {
  position: absolute;
  bottom: 4px;
  right: 4px;
  width: 16px;
  height: 16px;
  background: #00e676;
  border: 2.5px solid #111;
  border-radius: 50%;
}

.nb-name {
  font-family: 'Unbounded', sans-serif;
  font-size: 20px;
  font-weight: 900;
  color: #111;
  letter-spacing: -0.5px;
  line-height: 1.1;
  margin-bottom: 10px;
}

.nb-tag-row {
  display: flex;
  gap: 6px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 14px;
}

.nb-tag {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  padding: 3px 10px;
  border: 2px solid #111;
  background: #FFE135;
  color: #111;
  letter-spacing: 0.5px;
}

.nb-tag.alt { background: #c8f5e9; }
.nb-tag.alt2 { background: #ffd6f5; }

.nb-bio {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 13.5px;
  color: #444;
  line-height: 1.65;
  border-top: 2px solid #111;
  padding-top: 14px;
  margin-top: 4px;
}

.nb-divider-label {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 4px 0 2px;
}

.nb-divider-label span {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: #999;
  letter-spacing: 2px;
  white-space: nowrap;
}

.nb-divider-label::before,
.nb-divider-label::after {
  content: '';
  flex: 1;
  height: 2px;
  background: #ddd;
}

.nb-link {
  display: flex;
  align-items: center;
  gap: 16px;
  background: #fff;
  border: 3px solid #111;
  padding: 1.1rem 1.25rem;
  cursor: pointer;
  text-decoration: none;
  color: #111;
  box-shadow: 6px 6px 0 #111;
  transition: transform 0.12s cubic-bezier(.4,0,.2,1), box-shadow 0.12s cubic-bezier(.4,0,.2,1);
  position: relative;
  overflow: hidden;
}

.nb-link::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.04);
  transition: left 0.2s ease;
}

.nb-link:hover::before { left: 0; }

.nb-link:hover {
  transform: translate(-3px, -3px);
  box-shadow: 9px 9px 0 #111;
}

.nb-link:active {
  transform: translate(4px, 4px);
  box-shadow: 2px 2px 0 #111;
}

.nb-icon-box {
  width: 48px;
  height: 48px;
  border: 2.5px solid #111;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.nb-icon-box.gh { background: #24292e; }
.nb-icon-box.wa { background: #25d366; }
.nb-icon-box.tt { background: #010101; }
.nb-icon-box.yt { background: #ff0000; }

.nb-link-body { flex: 1; min-width: 0; }

.nb-link-name {
  font-family: 'Unbounded', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: #111;
  margin-bottom: 3px;
}

.nb-link-handle {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: #777;
}

.nb-link-badge {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  padding: 2px 7px;
  border: 1.5px solid #111;
  color: #111;
  letter-spacing: 1px;
}

.nb-link-arrow {
  font-size: 22px;
  font-weight: 900;
  color: #111;
  line-height: 1;
  margin-left: 4px;
}

.nb-avail {
  background: #c8f5e9;
  border: 3px solid #111;
  box-shadow: 6px 6px 0 #111;
  padding: 0.85rem 1.25rem;
  display: flex;
  align-items: center;
  gap: 10px;
}

.nb-avail-dot {
  width: 10px; height: 10px;
  background: #00c853;
  border: 2px solid #111;
  border-radius: 50%;
  flex-shrink: 0;
  animation: blink 1.8s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.nb-avail-text {
  font-family: 'DM Mono', monospace;
  font-size: 11.5px;
  font-weight: 500;
  color: #111;
  letter-spacing: 0.3px;
}

.nb-footer {
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: #bbb;
  padding-top: 4px;
  letter-spacing: 1px;
}
